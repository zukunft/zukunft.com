zukunft.com:
  tooltip-comment: "zukunft.com is the keyword to select the global settings for all zukunft.com pods"
  system configuration:
    tooltip-comment: "keyword to separate the internal system configuration"
    source-name: "config.yaml"
    source-description: "internal system configuration yaml file"
    database:
      version: 0.0.3
      tooltip-comment: "the version of the database of the master pod"
      retry:
        start delay:
          sec: 1
          tooltip-comment: "initial delay in seconds for the first connection retry"
        max delay:
          sec: 3600
          tooltip-comment: "the give up time for database connection retries"
      block size:
        tooltip-comment: "group the database statements for faster execution"
        insert: 200
        update: 100
        delete: 500
      row limit:
        tooltip-comment: "initial number of page rows"
        default: 20
      access:
        log:
          type:
            sys-conf-value: "round robin"
            tooltip-comment: "the type of the log size limitation: if round robin the storage size or time can be limited and older entries are simply deleted or in case of full a warning is created if the log reaches the limit"
          limit:
            storage size:
              MB: 500
              tooltip-comment: "if this storage size limit is reached a warning message to the admin user is created to remove the old log"
            time:
              days: 100
              tooltip-comment: "if the log type is round robin older log entries are automatically deleted"
      cache:
        config:
          limit:
            days: 150
            tooltip-comment: "if the cache is older than e.g. 150 days it will be recreated prevent issues due to potential refresh bugs"
          validate:
            type: "names"
            tooltip-comment: "if 'names' the phrase names are included in the cache for better readability. if 'full' all phrase parameters are included or 'none' if only the group id of the value is used"
      import:
        limit:
          tooltip-comment: "the maximal file size for each import files; bigger files are expected the be split into several parts"
          file size:
            MB: 10
        time percent:
          tooltip-comment: "the expected execution time for the database import in percent of the total process; values in percent, must sum to 100 and file read and decode file read and decode together account for only ~1% in total"
          file read: 0.4
          decode: 0.6
          object creation: 24
          object storing: 75
        expected time:
          tooltip-comment: "the expected times for the database import"
          bytes second:
            file read:
              sys-conf-value: 300
              tooltip-comment: "the estimated MB per second for pure reading the import file"
            decode:
              sys-conf-value: 40
              tooltip-comment: "the estimated MB per second for decoding the import json file"
            object creation:
              sys-conf-value: 5
              tooltip-comment: "the estimated MB per second for the object creation"
            object storing:
              sys-conf-value: 5
              tooltip-comment: "the estimated MB per second for storing the objects in the database"
            total:
              sys-conf-value: 2.1
              tooltip-comment: "the estimated MB per second that can be processed when importing a json"
          objects second:
            load:
              words:
                sys-conf-value: 800
                tooltip-comment: "the estimated number of words that can be loaded per second"
              triples:
                sys-conf-value: 790
                tooltip-comment: "the estimated number of triples that can be loaded per second"
              references:
                sys-conf-value: 780
                tooltip-comment: "the estimated number of references that can be loaded per second"
              sources:
                sys-conf-value: 780
                tooltip-comment: "the estimated number of sources that can be loaded per second"
              values:
                sys-conf-value: 770
                tooltip-comment: "the estimated number of values that can be loaded per second"
              formulas:
                sys-conf-value: 760
                tooltip-comment: "the estimated number of formulas that can be loaded per second"
              results:
                sys-conf-value: 755
                tooltip-comment: "the estimated number of pre-calculated results that can be loaded per second"
              views:
                sys-conf-value: 750
                tooltip-comment: "the estimated number of views that can be loaded per second"
              components:
                sys-conf-value: 740
                tooltip-comment: "the estimated number of components that can be loaded per second"
              ip-ranges:
                sys-conf-value: 730
                tooltip-comment: "the estimated number of ip-ranges that can be loaded per second"
            create:
              words:
                sys-conf-value: 700
                tooltip-comment: "the estimated number of words that can be created per second"
              triples:
                sys-conf-value: 420
                tooltip-comment: "the estimated number of triples that can be created per second"
              sources:
                sys-conf-value: 600
                tooltip-comment: "the estimated number of sources that can be created per second"
              references:
                sys-conf-value: 610
                tooltip-comment: "the estimated number of references that can be created per second"
              values:
                sys-conf-value: 250
                tooltip-comment: "the estimated number of values that can be created per second"
              formulas:
                sys-conf-value: 150
                tooltip-comment: "the estimated number of formulas that can be created per second"
              results:
                sys-conf-value: 140
                tooltip-comment: "the estimated number of pre-calculated results that can be created per second"
              views:
                sys-conf-value: 250
                tooltip-comment: "the estimated number of views that can be created per second"
              components:
                sys-conf-value: 280
                tooltip-comment: "the estimated number of components that can be created per second"
              ip-ranges:
                sys-conf-value: 270
                tooltip-comment: "the estimated number of ip-ranges that can be created per second"
            update:
              words:
                sys-conf-value: 590
                tooltip-comment: "the estimated number of words that can be updated per second"
              triples:
                sys-conf-value: 580
                tooltip-comment: "the estimated number of triples that can be updated per second"
              sources:
                sys-conf-value: 570
                tooltip-comment: "the estimated number of sources that can be updated per second"
              references:
                sys-conf-value: 560
                tooltip-comment: "the estimated number of references that can be updated per second"
              values:
                sys-conf-value: 550
                tooltip-comment: "the estimated number of values that can be updated per second"
              formulas:
                sys-conf-value: 540
                tooltip-comment: "the estimated number of formulas that can be updated per second"
              results:
                sys-conf-value: 535
                tooltip-comment: "the estimated number of pre-calculated results that can be updated per second"
              views:
                sys-conf-value: 530
                tooltip-comment: "the estimated number of views that can be updated per second"
              components:
                sys-conf-value: 520
                tooltip-comment: "the estimated number of components that can be updated per second"
              ip-ranges:
                sys-conf-value: 520
                tooltip-comment: "the estimated number of ip-ranges that can be updated per second"
            store:
              words:
                sys-conf-value: 800
                tooltip-comment: "the estimated number of words that can be added or updated in the database per second"
              triples:
                sys-conf-value: 450
                tooltip-comment: "the estimated number of triples that can be added or updated in the database per second"
              sources:
                sys-conf-value: 300
                tooltip-comment: "the estimated number of sources that can be added or updated in the database per second"
              references:
                sys-conf-value: 250
                tooltip-comment: "the estimated number of references that can be added or updated in the database per second"
              values:
                sys-conf-value: 95
                tooltip-comment: "the estimated number of values that can be added or updated in the database per second"
              formulas:
                sys-conf-value: 50
                tooltip-comment: "the estimated number of formulas that can be added or updated in the database per second"
              results:
                sys-conf-value: 45
                tooltip-comment: "the estimated number of pre-calculated results that can be added or updated in the database per second"
              views:
                sys-conf-value: 75
                tooltip-comment: "the estimated number of views that can be added or updated in the database per second"
              components:
                sys-conf-value: 85
                tooltip-comment: "the estimated number of components that can be added or updated in the database per second"
              ip-ranges:
                sys-conf-value: 95
                tooltip-comment: "the estimated number of ip-ranges that can be added or updated in the database per second"
            remove:
              elements:
                sys-conf-value: 800
                tooltip-comment: "the estimated number of elements that can be removed from the database per second using the list of predefined SQL statements"
      value table:
        table name:
          max phrase: 3
          tooltip-comment: "maximal number of phrases that can be included in the table name for a separate value table e.g. if the system detects that a separate table for the inhabitants at the end of the year of a city will increase speed and reduce time the table name can be inhabitants-city-year and each row has the city name and the columns have the year names"
        source table:
          min values:
            sys-conf-value: 1000
            tooltip-comment: "the minimal number of values before considering a separate table where the table name includes the source id so that the table can be a pure key value tables"
          max tables:
            sys-conf-value: 200
            tooltip-comment: "the maximal number of value source tables with one database"
      triples:
        max levels: 99
        tooltip-comment: "the maximal number of levels that are allowed for a triple e.g. if math and const are combined this is level 1, if pi is a math const this is level 2 and so on"
    user:
      tooltip-comment: "settings that each user can set individually"
      default:
        tooltip-comment: "the default settings for normal users"
        backend:
          rank:
            phrase: "usage"
            tooltip-comment: "the rank is the default word or triple that is used to sort the related objects e.g. math const are ranked by the time of discovery"
          impact:
            phrase: "happy time points"
            tooltip-comment: "the impact type is the default word or triple that is used to define what is most relevant"
          risk:
            phrase: "CHF"
            tooltip-comment: "the currency used to estimate the risk in case of an 1% change of a related parameter e.g. for an call of put option the change in the currency if the underlying stock price changes by 1%; for the risk calculation the same measure is used e.g. to set the priority of the jobs whereas the impact is used for sorting"
          max change:
            daily:
              ip user: 1000
              tooltip-comment: "maximal number of changes that an user without login can do per day"
        account:
          peers: 50
          tooltip-comment: "the initial number of best predictors that are assigned as peers on account opening"
        ranking:
          tooltip-comment: "to rank the users by their contribution quality and prediction abilities"
          prediction:
            factors:
              time:
                sys-conf-value: 2
                tooltip-comment: "a prediction with double the time period is used with factor e.g. of 2"
              impact:
                sys-conf-value: 2
                tooltip-comment: "a prediction with double the impact is used with factor e.g. of 2"
              usage:
                sys-conf-value: 2
                tooltip-comment: "a prediction that is used by two times more user accounts is used with factor e.g. of 2"
              factor wrong:
                sys-conf-value: 1.5
                tooltip-comment: "wrong prediction are scaled with this factor e.g. 2 to force users to make only few but good predictions"
          contribution:
            weights:
              impact:
                sys-conf-value: 2
                tooltip-comment: "a value or formula with double the impact on others is used with factor e.g. of 2 for the ranking"
              usage:
                sys-conf-value: 2
                tooltip-comment: "a value or formula that is used by two times more user accounts used with factor e.g. of 2 for the ranking"
              factor wrong:
                sys-conf-value: 1.5
                tooltip-comment: "wrong values or formulas are scaled with this factor e.g. 2 to force users to make only few but good contributions"
          combination:
            weights:
              contribution:
                sys-conf-value: "80%"
                tooltip-comment: "a valid contribution makes e.g. 80% of the total user ranking"
              prediction:
                sys-conf-value: "20%"
                tooltip-comment: "a valid predictions makes e.g. 20% of the total user ranking"
        url:
          tooltip-comment: "the setting for the url"
          format:
            sys-conf-value: "readable"
            tooltip-comment: "either 'technical' for a shortest possible url which is not human readable or 'readable' for an url which is easier to understand for humans or 'moveable' for a pod independent url"
        frontend:
          tooltip-comment: "the setting for the user interface"
          language:
            sys-conf-value: en
            tooltip-comment: "the language of the user frontend"
          selections:
            tooltip-comment: "the default number of item to select"
            target:
              web:
                sys-conf-value: 3
                tooltip-comment: "starting number of selection items show to the user on normal screens"
              web mobile:
                sys-conf-value: 2
                tooltip-comment: "starting number of selection items show to the user on small screens"
              increase list:
                sys-conf-value: "5,8,13,21"
                tooltip-comment: "list of items that is show if the user presses e.g. 3 time more 5 items are shown"
              decrease days:
                sys-conf-value: 20
                tooltip-comment: "if a user is offline for these number of days the number of selection items is decrease by one step to make the reentry easier"
          lists:
            tooltip-comment: "general parameters for lists e.g. the number of default entries"
            limit:
              min names:
                sys-conf-value: 4
                tooltip-comment: "number of object names that should at least be shown"
              min numbers:
                sys-conf-value: 20
                tooltip-comment: "number of object ids that should at least be shown"
              name list:
                sys-conf-value: 10
                tooltip-comment: "number of initial entries to show in a list names"
              link list:
                sys-conf-value: 8
                tooltip-comment: "number of initial entries to show in a list of links"
              system errors:
                sys-conf-value: 10
                tooltip-comment: "number of the most relevant open system errors to show to the user"
              related:
                per verb:
                  sys-conf-value: 2
                  tooltip-comment: "maximal number of related phrases shown inline per verb in a page title (e.g. for Zurich with limit 2 the title 'Zurich (City, Canton, ...)' shows the first two and a '...' link to the full list); also bounds the load on the backend so the response stays compact"
            separator:
              tooltip-comment: "the default separator for horizontal lists e.g. entry one, entry two / next topic"
              entry: ", "
              category: " / "
          layout:
            tooltip-comment: "the settings to position the components on the screen"
            side width:
              min:
                sys-conf-value: 1000
                tooltip-comment: "the minimal screen width in pixel to show a 'side or below' component beside the previous component; on smaller screens the component is shown below"
          row limit:
            tooltip-comment: "number of rows to be shown"
            word changes: 20
          behaviour:
            tooltip-comment: "reaction settings e.g. the expected response time"
            response time:
              min:
                sys-conf-value: 0.5
                tooltip-comment: "the minimal time in seconds between a screen updates to avoid flickering e.g. during long calculations every 2 sec the user should seen the screen updated"
              max:
                sys-conf-value: 2
                tooltip-comment: "the maximal time in seconds after the last screen update to indicate that the program is still running"
              target:
                sys-conf-value: 1
                tooltip-comment: "seconds after the user should see a screen update e.g. during long calculations every 2 sec the user should seen the screen updated"
              log:
                sys-conf-value: 1.2
                tooltip-comment: "if a user response takes more seconds the requesting url if written to the system time log for analysis"
              detail:
                sys-conf-value: 2
                tooltip-comment: "if a user response takes more seconds a log of the single execution steps is written to the system time log"
          time:
            tooltip-comment: "time related user-specific settings"
            min columns:
              sys-conf-value: 3
              tooltip-comment: "minimum number of same time type word to display in a table e.g. if at least 3 years exist use a table to display"
            max columns:
              sys-conf-value: 10
              tooltip-comment: "maximum number of same time type word to display in a table e.g. if more the 10 years exist, by default show only the last 10 years"
            future percent:
              sys-conf-value: 20
              tooltip-comment: "the default number of future outlook e.g. if there are 10 years of hist and 3 years of outlook display 8 years of hist and 2 years outlook"
          number format:
              percent decimal:
                sys-conf-value: 2
                tooltip-comment: "the default number of decimal places of a percent value"
    calculation:
      block size:
        average delay:
          millisecond: 1000
          tooltip-comment: "the average time in milliseconds to update the results of one formula use to estimate how many formulas can be combined on one calculation block"
    select:
      initial:
        entries: 5
        tooltip-comment: "the initial number of options shown to the user"
      suggested:
        entries: 3
        tooltip-comment: "if the selection list contains more than the initial entries, the number of suggested entries show on the top"
      more:
        entries: 20
        tooltip-comment: "if the selection list contains more than the initial entries, the number of alphabetic sorted entries show initially and added with each click on more"
      phrase:
        preselect:
          min: "30%"
          tooltip-comment: "used to preselect phrases for the next value: if 30% or more of the phrases of a list are the same, the probability is high that the next phrase is the same"
        same:
          threshold: "80%"
          tooltip-comment: "if the triple weight is above this threshold for the 'is a' or 'is symbol for' verbs the two phrases are handled as if they are the same e.g. for 'CHF' 'EUR', 'USD' are listed for 'similar to' even if the connection is 'two step' via 'Swiss frank' which is a currency"
    year:
      automatic create: 10
      tooltip-comment: "the number of futures years automatically created by the system"
    view:
      freeze: 20
      tooltip-comment: "the number of views by one user to automatically lock/freeze the view for the user, so that changes from other user does not change the view any more"
    component:
      list:
        entries:
          top:
            sys-conf-value: 20
            tooltip-comment: "the number of phrases shown in a list by default"
          bottom:
            sys-conf-value: 4
            tooltip-comment: "the number of phrases shown in a ranked list with the lowest ranking for an indication of the range"
    job:
      tooltip-comment: "keyword to separate the internal system job configuration"
    test:
      tooltip-comment: "to configure the internal system test"
      output format:
        sys-conf-value: 0
        tooltip-comment: "the general formatting style of the test results e.g. 0 for pure text or 1 for html code"
      level:
        sys-conf-value: 3
        tooltip-comment: "to define what should be shown: 4: all, 3: timeouts, 2: warnings or 1: only errors"
    pod:
      url: "zukunft.com"
      tooltip-comment: "the url name of this pod"
      database:
        version: 0.0.3
        tooltip-comment: "the version of the database of this pod"
      phrase distribution:
        top level:
          pods: 16380
          tooltip-comment: "for a fast selection of the prime responding pod the number of pods should start low but mainly the number of levels should be low"
      api:
        message:
          format: "json"
          tooltip-comment: "json for human friendly api message, yaml for as short as possible messages without compression and compressed to activate additional the compression on yaml messages; to sync the api message format between front end backend an upfront handshake message should be used; fallback is json"
      permissions:
        email server:
          not trusted: "hw-i.ru"
        country:
          trusted: "Switzerland"
      launch: 2026-06-07
      point:
        sys-conf-value: "50.478517691532666, 12.33581966347697"
        tooltip-comment: "the geo location of the main pod to estimate the time delays"
      limits:
        tooltip-comment: "limits per pod that, like all other pod settings, can only be changed by an admin user and that are used as a second line of defence to prevent unwanted behavior"
        max login:
          per day:
            by ip-address:
              sys-conf-value: 5
              tooltip-comment: "the max number of login creation from one ip per day"
            by location:
              sys-conf-value: 10
              tooltip-comment: "the max number of login creation from one location per day"
        max changes:
          per day:
            tooltip-comment: "the max number of insert or update changes that a normal user can do per days to prevent vandalism"
            words:
              sys-conf-value: 1000
            verbs:
              sys-conf-value: 10
            triples:
              sys-conf-value: 1000
            formulas:
              sys-conf-value: 100
            values:
              sys-conf-value: 10000
          per week:
            tooltip-comment: "like the max changes per days but per week"
            words:
              sys-conf-value: 5000
          per month:
            tooltip-comment: "like the max changes per days but per month"
            words:
              sys-conf-value: 20000
          per year:
            tooltip-comment: "like the max changes per days but per year"
            words:
              sys-conf-value: 1000000
        max lifetime:
          user:
            sys-conf-value: 120
            tooltip-comment: "the max number of years that a personal user account is expected to be active"
        api user:
          check period:
            month:
              sys-conf-value: 6
              tooltip-comment: "the number of month after that an api user should to be confirmed by an admin user"
          tolerance:
            month:
              sys-conf-value: 3
              tooltip-comment: "the number of month that the admin user has time to confirm an api account"
      hardware:
        usage:
          CPU:
            target: "50%"
            info: "70%"
            warning: "90%"
          network:
            target: "30%"
            info: "50%"
            warning: "70%"
          memory:
            target: "40%"
            info: "60%"
            warning: "80%"
          storage:
            target: "50%"
            info: "70%"
            warning: "80%"
          response time:
            millisecond:
              target: 100
              info: 500
              warning: 2000